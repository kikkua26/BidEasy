<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMo 大纲工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080b;
    --surface: #111116;
    --surface-2: #18181f;
    --surface-3: #1f1f28;
    --surface-4: #28283a;
    --accent: #d4a853;
    --accent-dim: #b8923f;
    --accent-glow: rgba(212, 168, 83, 0.12);
    --green: #4ead6b;
    --green-glow: rgba(78, 173, 107, 0.12);
    --red: #d45353;
    --blue: #5b8dd9;
    --text-primary: #e8e4dc;
    --text-secondary: #9e9889;
    --text-muted: #5e5a52;
    --border: #252530;
    --border-light: #2e2e3a;
    --radius: 10px;
    --font-display: 'Noto Serif SC', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 10% 15%, rgba(212,168,83,0.035) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 85%, rgba(90,70,160,0.025) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 1480px; margin: 0 auto;
    padding: 32px 28px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    opacity: 0; animation: fadeDown .6s ease .1s forwards;
  }

  .header h1 {
    font-size: 38px; font-weight: 700; letter-spacing: -.02em; line-height: 1.1;
    background: linear-gradient(135deg, var(--text-primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .header .subtitle {
    font-size: 13px; color: var(--text-muted); margin-top: 6px;
    font-family: var(--font-mono); letter-spacing: .05em;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; background: var(--accent-glow);
    border: 1px solid rgba(212,168,83,0.18); border-radius: 20px;
    font-size: 11.5px; font-family: var(--font-mono); color: var(--accent);
  }

  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 2s ease infinite;
  }

  /* ── Panels ── */
  .main-layout {
    display: grid; grid-template-columns: 420px 1fr; gap: 20px;
    flex: 1; min-height: 0;
    opacity: 0; animation: fadeUp .6s ease .25s forwards;
  }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface-2); flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px; font-family: var(--font-mono);
    color: var(--text-secondary); letter-spacing: .08em; text-transform: uppercase;
  }

  /* ── Input Panel ── */
  .input-panel .panel-body {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px 20px; gap: 12px; overflow: hidden;
  }

  .hint-box {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    font-size: 12.5px; color: var(--text-secondary); line-height: 1.7;
  }

  .hint-box code {
    font-family: var(--font-mono); font-size: 11.5px;
    background: var(--surface-3); padding: 1px 5px;
    border-radius: 3px; color: var(--accent);
  }

  .hint-box .ht { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }

  .textarea-wrap { flex: 1; position: relative; min-height: 0; }

  textarea {
    width: 100%; height: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-primary); font-family: var(--font-mono);
    font-size: 13px; line-height: 1.8; padding: 16px;
    resize: none; outline: none; transition: border-color .3s;
  }

  textarea:focus { border-color: rgba(212,168,83,0.35); }
  textarea::placeholder { color: var(--text-muted); font-family: var(--font-display); font-style: italic; }

  .char-count {
    position: absolute; bottom: 10px; right: 12px;
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted);
    pointer-events: none;
  }

  .action-bar {
    display: flex; gap: 8px; padding: 14px 20px;
    border-top: 1px solid var(--border); background: var(--surface-2); flex-shrink: 0;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border: none; border-radius: 8px;
    font-family: var(--font-display); font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .25s ease; letter-spacing: .01em;
  }

  .btn-primary { background: var(--accent); color: var(--bg); flex: 1; }
  .btn-primary:hover { background: #e0b560; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,168,83,0.2); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); padding: 6px 12px; font-size: 12px;
  }
  .btn-ghost:hover { color: var(--text-primary); border-color: var(--text-muted); }

  .btn-sm { padding: 6px 14px; font-size: 12px; }

  .btn-icon {
    padding: 8px; background: var(--surface-3); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 7px;
    cursor: pointer; transition: all .2s; display: inline-flex;
    align-items: center; justify-content: center;
  }
  .btn-icon:hover { color: var(--accent); border-color: rgba(212,168,83,0.3); }

  /* ── Output Panel ── */
  .output-panel .panel-body {
    flex: 1; overflow-y: auto; min-height: 0;
  }

  .output-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; min-height: 400px;
    color: var(--text-muted); text-align: center; gap: 14px;
  }
  .output-empty svg { opacity: .25; }
  .output-empty p { font-size: 13px; font-family: var(--font-mono); }

  /* ── Summary Section ── */
  .summary-section {
    margin: 16px 20px 0; padding: 16px 18px;
    background: linear-gradient(135deg, var(--accent-glow), rgba(90,70,160,0.04));
    border: 1px solid rgba(212,168,83,0.15); border-radius: 10px;
  }

  .summary-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; font-weight: 600; color: var(--accent); margin-bottom: 10px;
    font-family: var(--font-mono); letter-spacing: .03em;
  }

  .summary-label svg { opacity: .7; }

  .summary-hint {
    font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: auto;
    font-family: var(--font-mono);
  }

  .summary-textarea {
    width: 100%; min-height: 72px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212,168,83,0.12); border-radius: 7px;
    color: var(--text-primary); font-family: var(--font-display);
    font-size: 13px; line-height: 1.7; padding: 12px 14px;
    resize: vertical; outline: none; transition: border-color .3s;
  }
  .summary-textarea:focus { border-color: rgba(212,168,83,0.35); }
  .summary-textarea::placeholder { color: var(--text-muted); font-size: 12.5px; }

  /* ── Toolbar ── */
  .workspace-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; gap: 12px; flex-shrink: 0;
  }

  .toolbar-left { display: flex; align-items: center; gap: 10px; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }

  .btn-generate-all {
    background: linear-gradient(135deg, var(--accent), #c49a42);
    color: var(--bg); font-weight: 700; padding: 9px 22px;
    border: none; border-radius: 8px; font-family: var(--font-display);
    font-size: 13px; cursor: pointer; transition: all .25s;
    display: inline-flex; align-items: center; gap: 7px;
    letter-spacing: .02em;
  }
  .btn-generate-all:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,168,83,0.25); }
  .btn-generate-all:active { transform: translateY(0); }
  .btn-generate-all:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  .toolbar-stat {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }

  .toolbar-stat strong { color: var(--text-secondary); }

  /* ── Progress ── */
  .progress-wrap {
    padding: 0 20px; margin-bottom: 4px; display: none; flex-shrink: 0;
  }
  .progress-wrap.active { display: block; }

  .progress-bar-bg {
    width: 100%; height: 3px; background: var(--surface-3);
    border-radius: 2px; overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #e0b560);
    border-radius: 2px; transition: width .4s ease; width: 0%;
  }

  .progress-text {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted);
  }

  /* ── Sections List ── */
  .sections-list {
    padding: 4px 16px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }

  /* ── Section Card ── */
  .section-card {
    border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface); transition: border-color .25s, box-shadow .25s;
    overflow: hidden; opacity: 0; animation: slideIn .35s ease forwards;
  }
  .section-card:hover { border-color: var(--border-light); }
  .section-card.generating { border-color: rgba(212,168,83,0.25); }
  .section-card.done { border-color: rgba(78,173,107,0.2); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; user-select: none;
    transition: background .2s; gap: 10px;
  }
  .section-header:hover { background: var(--surface-2); }

  .section-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }

  .section-bar {
    width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch;
    min-height: 20px;
  }
  .level-1 .section-bar { background: var(--accent); }
  .level-2 .section-bar { background: var(--accent-dim); }
  .level-3 .section-bar { background: var(--text-muted); }
  .level-4 .section-bar { background: var(--border-light); }

  .section-num {
    font-family: var(--font-mono); font-size: 11.5px; color: var(--accent);
    min-width: 32px; flex-shrink: 0; font-weight: 500;
  }

  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .level-1 .section-title { font-size: 15px; font-weight: 700; }
  .level-3 .section-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .level-4 .section-title { font-size: 12.5px; font-weight: 400; color: var(--text-muted); }

  .level-badge {
    font-family: var(--font-mono); font-size: 9.5px; padding: 1px 6px;
    border-radius: 3px; background: var(--surface-3); color: var(--text-muted);
    flex-shrink: 0; letter-spacing: .04em;
  }

  .section-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .section-status {
    font-family: var(--font-mono); font-size: 10.5px; padding: 2px 9px;
    border-radius: 4px; letter-spacing: .03em;
  }
  .status-empty { color: var(--text-muted); background: var(--surface-3); }
  .status-generating { color: var(--accent); background: var(--accent-glow); animation: pulse 1.5s ease infinite; }
  .status-done { color: var(--green); background: var(--green-glow); }

  .section-gen-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--surface-3);
    color: var(--text-secondary); font-family: var(--font-mono);
    font-size: 11px; cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .section-gen-btn:hover { color: var(--accent); border-color: rgba(212,168,83,0.3); background: var(--accent-glow); }
  .section-gen-btn:disabled { opacity: .4; cursor: not-allowed; }
  .section-gen-btn svg { flex-shrink: 0; }

  .section-toggle {
    display: flex; align-items: center; transition: transform .25s;
    color: var(--text-muted); flex-shrink: 0;
  }
  .section-card.expanded .section-toggle { transform: rotate(90deg); }

  /* ── Section Body ── */
  .section-body {
    max-height: 0; overflow: hidden; transition: max-height .4s ease;
  }
  .section-card.expanded .section-body { max-height: 3000px; }

  .section-body-inner {
    padding: 0 14px 14px 14px;
    border-top: 1px solid var(--border);
  }

  /* ── Section Loading ── */
  .section-loading {
    display: none; align-items: center; gap: 10px;
    padding: 20px 0; color: var(--text-secondary);
    font-size: 12.5px; font-family: var(--font-mono);
  }
  .section-loading.active { display: flex; }

  .mini-dots { display: flex; gap: 4px; }
  .mini-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); animation: dotBounce 1.2s ease infinite;
  }
  .mini-dots span:nth-child(2) { animation-delay: .15s; }
  .mini-dots span:nth-child(3) { animation-delay: .3s; }

  /* ── Generated Content ── */
  .gen-content { display: none; padding-top: 14px; }
  .gen-content.active { display: block; }

  .gen-paragraph {
    font-size: 13.5px; line-height: 1.85; color: var(--text-secondary);
    margin-bottom: 12px; opacity: 0; animation: fadeInUp .4s ease forwards;
  }

  .gen-key-points {
    margin: 14px 0; padding: 14px 16px;
    background: var(--surface-2); border-radius: 8px;
    border-left: 3px solid var(--accent-dim);
    opacity: 0; animation: fadeInUp .4s ease .15s forwards;
  }

  .gen-kp-title {
    font-size: 12px; font-weight: 600; color: var(--accent);
    margin-bottom: 8px; font-family: var(--font-mono); letter-spacing: .04em;
  }

  .gen-kp-list { list-style: none; padding: 0; }
  .gen-kp-list li {
    position: relative; padding-left: 16px;
    font-size: 13px; line-height: 1.7; color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .gen-kp-list li::before {
    content: ''; position: absolute; left: 0; top: 8px;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent-dim); opacity: .6;
  }

  .gen-callout {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; margin: 12px 0;
    background: rgba(91,141,217,0.06); border: 1px solid rgba(91,141,217,0.12);
    border-radius: 7px; font-size: 12.5px; line-height: 1.7;
    color: var(--text-secondary);
    opacity: 0; animation: fadeInUp .4s ease .3s forwards;
  }
  .gen-callout-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .gen-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
    opacity: 0; animation: fadeInUp .4s ease .4s forwards;
  }

  .gen-word-count {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted);
  }

  .gen-actions { display: flex; gap: 6px; }

  .gen-btn-sm {
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 5px; background: transparent;
    color: var(--text-muted); font-family: var(--font-mono);
    font-size: 10.5px; cursor: pointer; transition: all .2s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .gen-btn-sm:hover { color: var(--text-primary); border-color: var(--text-muted); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface-3); color: var(--text-primary);
    padding: 10px 22px; border-radius: 8px;
    font-size: 12.5px; font-family: var(--font-mono);
    border: 1px solid var(--border); z-index: 999;
    transition: transform .3s ease; pointer-events: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Keyframes ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn  { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(8px);   } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  @keyframes dotBounce { 0%,80%,100% { transform:translateY(0); opacity:.3; } 40% { transform:translateY(-5px); opacity:1; } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Responsive ── */
  @media (max-width: 960px) {
    .main-layout { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header h1 { font-size: 30px; }
    .app { padding: 20px 14px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div>
      <h1>大纲工作台</h1>
      <div class="subtitle">MiMo AI — each section, independently generated</div>
    </div>
    <div class="badge"><span class="dot"></span> MiMo AI Ready</div>
  </header>

  <div class="main-layout">

    <!-- ════ LEFT: Input Panel ════ -->
    <div class="panel input-panel">
      <div class="panel-header">
        <span class="panel-title">输入内容</span>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost btn-sm" onclick="loadSample()">加载示例</button>
          <button class="btn-ghost btn-sm" onclick="clearAll()">清空</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="hint-box">
          <div class="ht">格式说明</div>
          Markdown 标题格式 <code>#</code> <code>##</code> <code>###</code> …<br>
          或数字编号 <code>1.</code> <code>1.1</code> <code>1.1.1</code>
        </div>
        <div class="textarea-wrap">
          <textarea id="inputArea" placeholder="在此输入你的大纲内容…&#10;&#10;# 一级标题&#10;## 二级标题&#10;### 三级标题" spellcheck="false"></textarea>
          <span class="char-count" id="charCount">0 字</span>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" id="parseBtn" onclick="parseAndRender()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          解析大纲
        </button>
      </div>
    </div>

    <!-- ════ RIGHT: Workspace Panel ════ -->
    <div class="panel output-panel">
      <div class="panel-header">
        <span class="panel-title">大纲工作台</span>
        <div style="display:flex;gap:6px;" id="headerActions" style="display:none">
          <button class="btn-icon" onclick="exportAll()" title="导出全部" id="exportBtn" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>

      <div class="panel-body" id="outputBody">
        <!-- Empty state -->
        <div class="output-empty" id="emptyState">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>解析大纲后，逐节生成内容</p>
        </div>

        <!-- Workspace (hidden initially) -->
        <div id="workspace" style="display:none">
          <!-- Shared summary -->
          <div class="summary-section">
            <div class="summary-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              共享概况
              <span class="summary-hint">所有 AI 共享参考</span>
            </div>
            <textarea class="summary-textarea" id="summaryInput" placeholder="输入背景概况信息，所有 AI 生成内容时均会参考此描述…&#10;例如：这是一份关于人工智能发展现状与未来趋势的研究报告，面向企业管理层和技术决策者。"></textarea>
          </div>

          <!-- Toolbar -->
          <div class="workspace-toolbar">
            <div class="toolbar-left">
              <button class="btn-generate-all" id="generateAllBtn" onclick="generateAll()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                一键全部生成
              </button>
            </div>
            <div class="toolbar-right">
              <span class="toolbar-stat" id="progressStat">
                <strong id="doneCount">0</strong> / <strong id="totalCount">0</strong> 已生成
              </span>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div class="progress-text">
              <span id="progressLabel">准备中…</span>
              <span id="progressPct">0%</span>
            </div>
          </div>

          <!-- Sections -->
          <div class="sections-list" id="sectionsList"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   STATE
   ══════════════════════════════════════ */
const state = {
  sections: [],        // { level, num, title, status, content, expanded }
  generating: false,
};

/* ══════════════════════════════════════
   INPUT
   ══════════════════════════════════════ */
const inputArea = document.getElementById('inputArea');
const charCount = document.getElementById('charCount');
inputArea.addEventListener('input', () => { charCount.textContent = inputArea.value.length + ' 字'; });

function loadSample() {
  inputArea.value = `# 人工智能发展研究报告

## 第一章 引言
### 1.1 研究背景
### 1.2 研究目的与意义
### 1.3 研究方法

## 第二章 人工智能技术概述
### 2.1 机器学习基础
#### 2.1.1 监督学习
#### 2.1.2 无监督学习
#### 2.1.3 强化学习
### 2.2 深度学习技术
#### 2.2.1 卷积神经网络
#### 2.2.2 循环神经网络
#### 2.2.3 Transformer 架构
### 2.3 自然语言处理
### 2.4 计算机视觉

## 第三章 大语言模型的发展
### 3.1 从 GPT 到通用大模型
### 3.2 开源与闭源之争
### 3.3 多模态融合趋势
### 3.4 Agent 与工具使用

## 第四章 行业应用与实践
### 4.1 医疗健康
### 4.2 金融科技
### 4.3 教育领域
### 4.4 智能制造

## 第五章 挑战与展望
### 5.1 数据安全与隐私
### 5.2 模型可解释性
### 5.3 伦理与治理框架
### 5.4 未来发展方向

## 结论
## 参考文献`;
  charCount.textContent = inputArea.value.length + ' 字';
  document.getElementById('summaryInput').value = '本报告系统梳理了人工智能领域的技术演进、产业应用和未来趋势，面向技术决策者和学术研究者，旨在提供全面的行业洞察。';
  inputArea.focus();
}

function clearAll() {
  inputArea.value = '';
  charCount.textContent = '0 字';
  document.getElementById('summaryInput').value = '';
  state.sections = [];
  document.getElementById('workspace').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('exportBtn').style.display = 'none';
  resetProgress();
}

/* ══════════════════════════════════════
   PARSING
   ══════════════════════════════════════ */
function parseContent(text) {
  const lines = text.split('\n').filter(l => l.trim() !== '');
  const items = [];
  for (const line of lines) {
    const t = line.trim();
    const md = t.match(/^(#{1,6})\s+(.+)$/);
    if (md) { items.push({ level: md[1].length, title: md[2].replace(/[#*_`]/g,'').trim() }); continue; }
    const num = t.match(/^(\d+(?:\.\d+)*)\.\s*(.+)$/);
    if (num) { items.push({ level: Math.min(num[1].split('.').length, 4), title: num[2].trim() }); continue; }
    const cn = t.match(/^[一二三四五六七八九十]+[、.．]\s*(.+)$/);
    if (cn) { items.push({ level: 1, title: cn[1].trim() }); continue; }
  }
  return items;
}

function parseAndRender() {
  const text = inputArea.value.trim();
  if (!text) { showToast('请先输入内容'); return; }
  const items = parseContent(text);
  if (!items.length) { showToast('未能识别标题格式'); return; }

  // Build numbered sections
  const counters = [0,0,0,0,0,0];
  state.sections = items.map((item, idx) => {
    counters[item.level - 1]++;
    for (let i = item.level; i < counters.length; i++) counters[i] = 0;
    const parts = [];
    for (let i = 0; i < item.level; i++) parts.push(counters[i]);
    return { level: item.level, num: parts.join('.'), title: item.title, status: 'empty', content: '', expanded: false };
  });

  renderSections();
  document.getElementById('workspace').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('exportBtn').style.display = 'flex';
  resetProgress();
  showToast(`已解析 ${state.sections.length} 个章节`);
}

/* ══════════════════════════════════════
   RENDERING
   ══════════════════════════════════════ */
function renderSections() {
  const list = document.getElementById('sectionsList');
  list.innerHTML = '';
  state.sections.forEach((s, i) => {
    s.expanded = false;
    const card = document.createElement('div');
    card.className = `section-card level-${Math.min(s.level,4)}`;
    card.id = `card-${i}`;
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="section-header" onclick="toggleSection(${i})">
        <div class="section-left">
          <div class="section-bar"></div>
          <span class="section-num">${s.num}</span>
          <span class="section-title">${esc(s.title)}</span>
          <span class="level-badge">H${s.level}</span>
        </div>
        <div class="section-right">
          <span class="section-status status-empty" id="status-${i}">待生成</span>
          <button class="section-gen-btn" id="genBtn-${i}" onclick="event.stopPropagation();generateSection(${i})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            AI 生成
          </button>
          <span class="section-toggle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
      </div>
      <div class="section-body" id="body-${i}">
        <div class="section-body-inner">
          <div class="section-loading" id="loading-${i}">
            <div class="mini-dots"><span></span><span></span><span></span></div>
            <span>MiMo 正在为「${esc(s.title)}」生成内容…</span>
          </div>
          <div class="gen-content" id="content-${i}"></div>
        </div>
      </div>`;
    list.appendChild(card);
  });
  updateStats();
}

function toggleSection(i) {
  const card = document.getElementById(`card-${i}`);
  state.sections[i].expanded = !state.sections[i].expanded;
  card.classList.toggle('expanded');
}

function updateStats() {
  const done = state.sections.filter(s => s.status === 'done').length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = state.sections.length;
}

function resetProgress() {
  document.getElementById('progressWrap').classList.remove('active');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = '准备中…';
  document.getElementById('progressPct').textContent = '0%';
  updateStats();
}

function updateProgress() {
  const total = state.sections.length;
  const done = state.sections.filter(s => s.status === 'done').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = done < total
    ? `正在生成 ${done + 1}/${total}…`
    : '全部完成';
  updateStats();
}

/* ══════════════════════════════════════
   MOCK AI CONTENT GENERATOR
   ══════════════════════════════════════ */
function mockAI(title, summary, level) {
  const ctx = summary ? summary.substring(0, 120) : '';

  // Keyword-based content pools
  const isIntro    = /引言|绪论|概述|背景|前言/.test(title);
  const isTech     = /技术|算法|方法|架构|模型|系统|学习|网络|处理|视觉|计算/.test(title);
  const isApp      = /应用|实践|案例|行业|场景|医疗|金融|教育|制造/.test(title);
  const isChallenge= /挑战|问题|困难|风险|安全|隐私|伦理|治理/.test(title);
  const isFuture   = /展望|未来|方向|趋势|发展/.test(title);
  const isConclusion=/结论|总结|结语/.test(title);
  const isRef      = /参考|文献|引用/.test(title);

  const pool = [];
  const summaryCtx = ctx ? `结合${ctx.slice(0,30)}…的整体背景，` : '';

  // Intro paragraphs
  const intros = [
    `${summaryCtx}${title}是本研究框架中不可或缺的重要组成部分。该领域的研究不仅有助于深入理解相关理论体系，更对推动实际应用具有重要意义。本文将从多个维度展开系统性分析。`,
    `${summaryCtx}${title}近年来受到学术界和产业界的广泛关注。在技术快速迭代和应用场景持续拓展的双重驱动下，该领域的研究呈现出蓬勃发展的态势，为后续讨论提供了坚实基础。`,
  ];

  // Tech paragraphs
  const techs = [
    `从技术架构层面来看，${title}涉及多个关键组件的协同运作。核心算法的设计直接影响系统的整体性能和可扩展性。近年来，研究者们在模型优化、计算效率和泛化能力等方面取得了一系列突破性进展。`,
    `${title}的技术演进经历了从早期探索到成熟应用的完整过程。早期方法主要依赖于人工特征工程，而现代方法则更多地采用端到端的学习范式，大幅降低了领域专业知识的门槛。`,
  ];

  // App paragraphs
  const apps = [
    `${title}的实际应用已经渗透到社会经济的多个领域。以典型应用场景为例，该技术在提升效率、降低成本、优化用户体验等方面展现出显著优势，已有多个成功的商业化案例验证了其实际价值。`,
    `在${title}的落地过程中，企业积累了丰富的实践经验。从需求分析、方案设计到部署运维，每个环节都面临着独特的技术挑战和业务约束，这些经验为后续项目提供了宝贵的参考。`,
  ];

  // Challenge paragraphs
  const challenges = [
    `尽管${title}取得了显著进展，但仍面临一系列亟待解决的问题。其中，技术层面的瓶颈主要体现在性能优化、资源消耗和系统稳定性等方面；而制度层面则涉及标准化建设和行业规范的完善。`,
    `应对${title}相关挑战需要多方协同努力。学术界应持续深化基础研究，产业界需积极探索可行的解决方案，政策制定者则应构建合理的治理框架，形成产学研用的良性互动机制。`,
  ];

  // Future paragraphs
  const futures = [
    `展望未来，${title}将在以下几个方向持续演进：首先是技术本身的迭代升级，其次是应用场景的深度拓展，最后是跨领域融合带来的新机遇。这些趋势将共同塑造该领域的发展格局。`,
    `${title}的未来发展既充满机遇，也伴随着不确定性。在技术创新、市场需求和政策导向的共同作用下，该领域有望迎来新一轮的突破，为社会经济发展注入新的动力。`,
  ];

  // Conclusion paragraphs
  const conclusions = [
    `综上所述，${title}贯穿本研究的各个层面，是理解整体研究框架的关键线索。通过对前述内容的系统梳理和深入分析，我们可以得出若干重要结论和启示。`,
    `本研究围绕${title}进行了多角度的探讨，从理论分析到实践验证，形成了较为完整的研究链条。研究结果表明，该领域仍存在广阔的发展空间和深入研究的价值。`,
  ];

  // Reference
  const refs = [
    `[1] Smith, J. et al. (2024). Advances in ${title}. Journal of AI Research, 45(2), 112-138.`,
    `[2] 张伟, 李明. (2024). ${title}综述. 计算机学报, 47(3), 501-520.`,
    `[3] Chen, W. & Park, S. (2023). A Survey on ${title}. IEEE Trans. on PAMI, 42(8), 1987-2005.`,
  ];

  // Select content based on type
  let chosen = [];
  if (isRef) {
    return { type: 'reference', items: refs };
  }
  if (isIntro) {
    chosen = [pick(intros), pick(techs)];
  } else if (isTech) {
    chosen = [pick(techs), pick(techs)];
  } else if (isApp) {
    chosen = [pick(apps), pick(apps)];
  } else if (isChallenge) {
    chosen = [pick(challenges), pick(challenges)];
  } else if (isFuture) {
    chosen = [pick(futures), pick(techs)];
  } else if (isConclusion) {
    chosen = [pick(conclusions), pick(futures)];
  } else {
    chosen = [pick(intros), pick(techs), pick(apps)];
  }

  // Build result
  const result = { type: 'content', paragraphs: [], points: null, insight: null };

  // First paragraph
  result.paragraphs.push(chosen[0]);

  // Key points (for level 1-2 sections)
  if (level <= 2) {
    result.points = {
      title: '核心要点',
      items: [
        `${title}的基本概念与理论基础`,
        `核心技术方法与实现路径`,
        `关键影响因素及其相互关系`,
        `实际应用价值与发展前景`,
      ]
    };
  }

  // Middle paragraphs
  for (let i = 1; i < chosen.length; i++) {
    result.paragraphs.push(chosen[i]);
  }

  // Insight callout
  if (level <= 2 && Math.random() > 0.3) {
    const insights = [
      `跨学科视角下的分析表明，${title}与多个前沿领域存在显著的交叉融合潜力。`,
      `数据驱动的研究方法正在为${title}的深入探索提供新的方法论支撑。`,
      `从系统论的角度审视，${title}的复杂性要求研究者具备更强的综合分析能力。`,
    ];
    result.insight = pick(insights);
  }

  return result;

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
}

/* ══════════════════════════════════════
   GENERATE SINGLE SECTION
   ══════════════════════════════════════ */
async function generateSection(idx) {
  const s = state.sections[idx];
  if (s.status === 'generating') return;

  const summary = document.getElementById('summaryInput').value.trim();
  const card = document.getElementById(`card-${idx}`);
  const statusEl = document.getElementById(`status-${idx}`);
  const genBtn = document.getElementById(`genBtn-${idx}`);
  const loadingEl = document.getElementById(`loading-${idx}`);
  const contentEl = document.getElementById(`content-${idx}`);

  // Set generating state
  s.status = 'generating';
  card.classList.add('generating');
  card.classList.remove('done');
  statusEl.className = 'section-status status-generating';
  statusEl.textContent = '生成中…';
  genBtn.disabled = true;
  genBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> 生成中…';
  contentEl.classList.remove('active');
  contentEl.innerHTML = '';
  loadingEl.classList.add('active');

  // Expand card
  if (!s.expanded) { s.expanded = true; card.classList.add('expanded'); }

  // Simulate AI processing
  await sleep(600 + Math.random() * 1200);

  // Generate content
  const result = mockAI(s.title, summary, s.level);

  // Render
  loadingEl.classList.remove('active');
  contentEl.innerHTML = renderGenContent(result);
  contentEl.classList.add('active');

  // Update state
  s.status = 'done';
  s.content = result;
  card.classList.remove('generating');
  card.classList.add('done');
  statusEl.className = 'section-status status-done';
  statusEl.textContent = '已完成';
  genBtn.disabled = false;
  genBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> 重新生成';

  updateProgress();
}

function renderGenContent(result) {
  if (result.type === 'reference') {
    return `<div class="gen-paragraph" style="font-family:var(--font-mono);font-size:12px;line-height:2;color:var(--text-muted);">
      ${result.items.map(r => `<div>${esc(r)}</div>`).join('')}
    </div>`;
  }

  let html = '';

  result.paragraphs.forEach((p, i) => {
    html += `<p class="gen-paragraph" style="animation-delay:${i * 0.12}s">${esc(p)}</p>`;
    // Insert key points after first paragraph
    if (i === 0 && result.points) {
      html += `<div class="gen-key-points" style="animation-delay:${(i+1) * 0.12}s">
        <div class="gen-kp-title">${result.points.title}</div>
        <ul class="gen-kp-list">${result.points.items.map(it => `<li>${esc(it)}</li>`).join('')}</ul>
      </div>`;
    }
  });

  if (result.insight) {
    html += `<div class="gen-callout">
      <span class="gen-callout-icon">💡</span>
      <span>${esc(result.insight)}</span>
    </div>`;
  }

  // Word count
  const allText = result.paragraphs.join('') + (result.points ? result.points.items.join('') : '') + (result.insight || '');
  const wc = allText.replace(/\s/g, '').length;

  html += `<div class="gen-footer">
    <span class="gen-word-count">共 ${wc} 字</span>
    <div class="gen-actions">
      <button class="gen-btn-sm" onclick="copySectionText(this)" data-text="${esc(allText)}">复制</button>
    </div>
  </div>`;

  return html;
}

/* ══════════════════════════════════════
   GENERATE ALL
   ══════════════════════════════════════ */
async function generateAll() {
  if (state.generating) return;
  state.generating = true;

  const btn = document.getElementById('generateAllBtn');
  btn.disabled = true;
  document.getElementById('progressWrap').classList.add('active');

  // Staggered generation
  const promises = state.sections.map((s, i) => {
    return new Promise(resolve => {
      setTimeout(async () => {
        await generateSection(i);
        resolve();
      }, i * 350);
    });
  });

  await Promise.all(promises);

  state.generating = false;
  btn.disabled = false;
  showToast('全部内容生成完成');
}

/* ══════════════════════════════════════
   ACTIONS
   ══════════════════════════════════════ */
function copySectionText(btn) {
  const text = btn.getAttribute('data-text');
  navigator.clipboard.writeText(text).then(() => showToast('已复制本节内容'));
}

function exportAll() {
  const summary = document.getElementById('summaryInput').value.trim();
  let out = '';
  if (summary) out += `【概况】\n${summary}\n\n${'═'.repeat(40)}\n\n`;
  state.sections.forEach(s => {
    const indent = '  '.repeat(s.level - 1);
    out += `${indent}${s.num} ${s.title}\n`;
    if (s.status === 'done' && s.content) {
      if (s.content.type === 'reference') {
        s.content.items.forEach(r => { out += `  ${indent}${r}\n`; });
      } else {
        s.content.paragraphs.forEach(p => { out += `\n  ${indent}${p}\n`; });
      }
      out += '\n';
    }
  });
  navigator.clipboard.writeText(out).then(() => showToast('全部内容已导出到剪贴板'));
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* Keyboard shortcut */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') parseAndRender();
});
</script>
</body>
</html>
